# ── Post-Deploy Smoke Test ────────────────────────────────────────────────────
# Vérifie que la production répond correctement après chaque deploy sur main.
# Se déclenche après le workflow "Deploy to Cloudflare Workers" (pipeline prod).

name: "Post-Deploy — Smoke Test"

on:
  workflow_run:
    workflows: ["Deploy to Cloudflare Workers"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

env:
  PROD_URL: https://vitfix.io

jobs:
  smoke-test:
    name: "Smoke test production"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 5

    steps:
      - name: Attendre la propagation Cloudflare
        run: sleep 30

      - name: Vérifier /api/health
        run: |
          HTTP_STATUS=$(curl -sL -o /tmp/health.json -w "%{http_code}" "$PROD_URL/api/health")
          echo "Status: $HTTP_STATUS"
          cat /tmp/health.json | jq .
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Vérifier la page d'accueil FR
        run: |
          HTTP_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$PROD_URL/fr/")
          echo "Homepage FR status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Homepage FR returned $HTTP_STATUS"
            exit 1
          fi

      - name: Vérifier la page d'accueil PT
        run: |
          HTTP_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$PROD_URL/pt/")
          echo "Homepage PT status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Homepage PT returned $HTTP_STATUS"
            exit 1
          fi

      - name: Résumé
        if: success()
        run: echo "✓ Production smoke test passed — all endpoints healthy"

      - name: Alerte échec
        if: failure()
        run: |
          echo "::error::PRODUCTION SMOKE TEST FAILED — vérifier https://vitfix.io immédiatement"
          echo "Rollback: wrangler rollback ou redéployer le commit précédent via le workflow 'Deploy to Cloudflare Workers'"
