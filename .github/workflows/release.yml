# ── Release — Changelog automatique & GitHub Releases ────────────────────────
# Génère le changelog à partir des commits conventionnels.
# Préfixes reconnus : feat, fix, chore, docs, ai, voice, perf.

name: "Release — Changelog & Versions"

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: "Release Please"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Créer ou mettre à jour la release
        uses: google-github-actions/release-please-action@a017ec70c7f1401744d60197f7577a0c51c8c1cf # v4
        with:
          release-type: node
          manifest-file: ".release-please-manifest.json"
          config-file: "release-please-config.json"
