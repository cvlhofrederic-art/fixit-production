name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "!.github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://vitfix.io

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 minimum : wrangler ≥ 4.86 le requiert (le deploy échouait en
          # boucle sur Node 20 — « Wrangler requires at least Node.js v22.0.0 »).
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext bundle
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://vitfix.io
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npx @opennextjs/cloudflare build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          # Sans wranglerVersion, l'action installe SA version par défaut
          # (vieille) au lieu de celle du lockfile : les assets @vercel/og de
          # next 16.2.9 cassent son module-collector. 4.100.0 = version validée
          # par dry-run (clone propre, build OpenNext 1.19.11). Garder aligné
          # avec devDependencies.wrangler.
          wranglerVersion: "4.100.0"

      - name: Smoke test
        run: |
          sleep 10
          # Follow redirects (middleware sends / → /fr/) and check final 200
          for url in https://vitfix.io https://vitfix.io/fr https://vitfix.io/robots.txt; do
            code=$(curl -sL -o /dev/null -w "%{http_code}" "$url")
            echo "$url → $code"
            if [ "$code" != "200" ]; then
              echo "::error::Smoke test failed for $url (HTTP $code)"
              exit 1
            fi
          done
