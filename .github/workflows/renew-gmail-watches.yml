name: Renew Gmail watches (Alfredo)

# Renouvelle quotidiennement les Gmail watches Pub/Sub qui expirent dans < 24h.
# Cf. scripts/renew-gmail-watches.ts et docs Plan C Task 15.
#
# Secrets requis (GitHub > Settings > Secrets > Actions) :
#   - NEXT_PUBLIC_SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE_KEY
#   - OAUTH_TOKENS_ENCRYPTION_KEY
#   - GCP_PROJECT_ID
#   - GMAIL_PUSH_TOPIC

on:
  schedule:
    # Tous les jours à 03:17 UTC (heure off-peak)
    - cron: '17 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  renew:
    name: Renouveler les watches Gmail
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run renew script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OAUTH_TOKENS_ENCRYPTION_KEY: ${{ secrets.OAUTH_TOKENS_ENCRYPTION_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GMAIL_PUSH_TOPIC: ${{ secrets.GMAIL_PUSH_TOPIC }}
        run: npx tsx scripts/renew-gmail-watches.ts
