# ── Qualité de code — SonarCloud, ESLint, TypeScript ──────────────────────────
# Analyse qualité, linting et vérification des types sur chaque PR.

name: "Qualité de code"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── ESLint & TypeScript — Linting et types ─────────────────────────────────
  lint:
    name: "ESLint & TypeScript"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurer Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer ESLint
        run: npm run lint

      - name: Vérifier les types TypeScript
        run: npx tsc --noEmit

  # ── Migrations SQL — Validation syntaxe et cohérence ─────────────────────
  migrations:
    name: "SQL Migrations — Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fixit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout du code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Activer les extensions Supabase courantes
        run: |
          psql postgresql://postgres:postgres@localhost:5432/fixit_test -c "
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
          "

      - name: Stub des schémas Supabase (auth, storage, cron)
        # Les migrations référencent auth.users, storage.objects et cron.schedule
        # (fournis en prod par Supabase). Le runner postgres vanilla n'a pas ces
        # schémas — on crée des stubs minimalistes pour permettre la validation
        # syntaxique et structurelle sans dépendre de l'infra Supabase.
        run: |
          psql postgresql://postgres:postgres@localhost:5432/fixit_test -v ON_ERROR_STOP=1 <<'SQL'
            CREATE SCHEMA IF NOT EXISTS auth;
            CREATE TABLE IF NOT EXISTS auth.users (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              email TEXT,
              encrypted_password TEXT,
              raw_user_meta_data JSONB DEFAULT '{}'::jsonb,
              raw_app_meta_data JSONB DEFAULT '{}'::jsonb,
              created_at TIMESTAMPTZ DEFAULT NOW(),
              updated_at TIMESTAMPTZ DEFAULT NOW()
            );
            CREATE OR REPLACE FUNCTION auth.uid() RETURNS UUID LANGUAGE SQL STABLE AS $stub$ SELECT NULL::UUID $stub$;
            CREATE OR REPLACE FUNCTION auth.role() RETURNS TEXT LANGUAGE SQL STABLE AS $stub$ SELECT 'anon'::TEXT $stub$;
            CREATE OR REPLACE FUNCTION auth.jwt() RETURNS JSONB LANGUAGE SQL STABLE AS $stub$ SELECT '{}'::JSONB $stub$;

            CREATE SCHEMA IF NOT EXISTS storage;
            CREATE TABLE IF NOT EXISTS storage.objects (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              bucket_id TEXT,
              name TEXT,
              owner UUID,
              created_at TIMESTAMPTZ DEFAULT NOW(),
              updated_at TIMESTAMPTZ DEFAULT NOW(),
              metadata JSONB
            );

            CREATE SCHEMA IF NOT EXISTS cron;
            CREATE OR REPLACE FUNCTION cron.schedule(jobname TEXT, schedule TEXT, command TEXT) RETURNS BIGINT LANGUAGE SQL AS $stub$ SELECT 0::BIGINT $stub$;
            CREATE OR REPLACE FUNCTION cron.unschedule(job_name TEXT) RETURNS BOOLEAN LANGUAGE SQL AS $stub$ SELECT true $stub$;
          SQL

      - name: Appliquer les migrations séquentiellement
        # Les migrations historiques (001-051) font référence à des tables
        # créées par la baseline (052) ou à des schémas propres à l'environnement
        # Supabase (auth). On applique 052 D'ABORD (baseline idempotent) puis
        # toutes les autres dans l'ordre alphabétique — les échecs de migrations
        # legacy non bloquants (tant que la baseline passe et que des tables
        # sont créées à la fin).
        run: |
          BASELINE="supabase/migrations/052_baseline_missing_tables.sql"
          echo "== Applying baseline: $(basename $BASELINE) =="
          psql postgresql://postgres:postgres@localhost:5432/fixit_test \
            -v ON_ERROR_STOP=1 -f "$BASELINE"

          FAIL_COUNT=0
          SUCCESS_COUNT=0
          for file in $(ls supabase/migrations/*.sql | sort); do
            [ "$file" = "$BASELINE" ] && continue
            echo "== Applying: $(basename $file) =="
            if psql postgresql://postgres:postgres@localhost:5432/fixit_test \
                 -v ON_ERROR_STOP=1 -f "$file" 2>&1; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            else
              echo "::warning::Migration non applicable en CI : $(basename $file)"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done
          echo "Migrations : $SUCCESS_COUNT réussies · $FAIL_COUNT non applicables"

      - name: Vérifier les tables créées
        run: |
          TABLES=$(psql postgresql://postgres:postgres@localhost:5432/fixit_test -t -c "
            SELECT count(*) FROM information_schema.tables
            WHERE table_schema = 'public' AND table_type = 'BASE TABLE';
          " | tr -d ' ')
          echo "Tables créées : $TABLES"
          # Seuil : la baseline (052) définit au moins 9 tables critiques
          if [ "$TABLES" -lt 5 ]; then
            echo "::error::Moins de 5 tables créées — la baseline a échoué"
            exit 1
          fi

  # ── SonarCloud — Analyse qualité ──────────────────────────────────────────
  # Requis : configurer SONAR_TOKEN dans GitHub Secrets
  # Créer le projet sur https://sonarcloud.io et lier le repo GitHub
  sonarcloud:
    name: "SonarCloud — Analyse qualité"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Analyse SonarCloud
        # continue-on-error: SonarCloud est configuré en "Automatic Analysis"
        # côté projet → il refuse le CI analysis en parallèle (exit code 3).
        # Ne bloque pas la PR, l'analyse automatique côté SonarCloud reste active.
        continue-on-error: true
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.sources=app,lib,components,hooks
            -Dsonar.tests=tests
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=node_modules/**,out/**,.next/**,android/**,ios/**
