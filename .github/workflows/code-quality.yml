# ── Qualité de code — SonarCloud, ESLint, TypeScript ──────────────────────────
# Analyse qualité, linting et vérification des types sur chaque PR.

name: "Qualité de code"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── ESLint & TypeScript — Linting et types ─────────────────────────────────
  lint:
    name: "ESLint & TypeScript"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurer Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer ESLint
        run: npm run lint

      - name: Vérifier les types TypeScript
        run: npx tsc --noEmit

  # ── Migrations SQL — Validation syntaxe et cohérence ─────────────────────
  migrations:
    name: "SQL Migrations — Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fixit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout du code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Activer les extensions Supabase courantes
        run: |
          psql postgresql://postgres:postgres@localhost:5432/fixit_test -c "
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
          "

      - name: Appliquer les migrations séquentiellement
        run: |
          FAIL=0
          for file in $(ls supabase/migrations/*.sql | sort); do
            echo "== Applying: $(basename $file) =="
            if ! psql postgresql://postgres:postgres@localhost:5432/fixit_test -v ON_ERROR_STOP=1 -f "$file" 2>&1; then
              echo "::error::Migration failed: $(basename $file)"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more migrations failed"
            exit 1
          fi

      - name: Vérifier les tables créées
        run: |
          TABLES=$(psql postgresql://postgres:postgres@localhost:5432/fixit_test -t -c "
            SELECT count(*) FROM information_schema.tables
            WHERE table_schema = 'public' AND table_type = 'BASE TABLE';
          " | tr -d ' ')
          echo "Tables created: $TABLES"
          if [ "$TABLES" -eq 0 ]; then
            echo "::error::No tables created — migrations may be empty"
            exit 1
          fi

  # ── SonarCloud — Analyse qualité ──────────────────────────────────────────
  # Requis : configurer SONAR_TOKEN dans GitHub Secrets
  # Créer le projet sur https://sonarcloud.io et lier le repo GitHub
  sonarcloud:
    name: "SonarCloud — Analyse qualité"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Analyse SonarCloud
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.sources=app,lib,components,hooks
            -Dsonar.tests=tests
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=node_modules/**,out/**,.next/**,android/**,ios/**
