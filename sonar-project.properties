sonar.projectKey=cvlhofrederic-art_fixit-production
sonar.organization=cvlhofrederic-art

sonar.sources=app,lib,components,hooks
sonar.tests=tests,e2e

# Exclusions : fichiers vendored/minifiés/générés non pertinents pour l'analyse
sonar.exclusions=node_modules/**,out/**,.next/**,android/**,ios/**,public/**,supabase/migrations/**,.claude/**,scripts/**
sonar.test.exclusions=node_modules/**

# Copy-Paste-Detection exclusions :
# - Les recettes PT miroirs de FR partagent volontairement la structure Zod du
#   type Recipe (ratios, pertes, DTU/NP). Le code se répète par design — ce
#   sont des données, pas de la logique.
# - Les fichiers de recettes FR ont aussi des patterns répétitifs (chaque trade
#   liste ses matériaux avec le même shape).
sonar.cpd.exclusions=lib/estimation-materiaux/recipes/**,lib/estimation-materiaux/data/**
# Même principe pour les SEO templates localisés.
sonar.cpd.exclusions=lib/estimation-materiaux/recipes/**,lib/estimation-materiaux/data/**,app/fr/ville/**,app/fr/services/**,app/fr/specialites/**,app/pt/servicos/**,app/pt/cidade/**,app/pt/urgencia/**

# Qualité gate : relaxation sur la dette technique — le code existant a de la
# dette documentée qui ne doit pas bloquer les PR features.
sonar.qualitygate.wait=false
sonar.newCode.referenceBranch=main

# Language settings
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
