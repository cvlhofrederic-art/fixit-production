sonar.projectKey=cvlhofrederic-art_fixit-production
sonar.organization=cvlhofrederic-art

sonar.sources=app,lib,components,hooks
sonar.tests=tests,e2e

# Exclusions full (pas analysées du tout) : code vendored/minifié/données pures
# - recipes/** : 162 recettes = pure data (schema Zod + ratios), non du code
#   à auditer. Le LLM quality gate de SonarCloud fausse le ratio "duplication"
#   car les recettes FR/PT partagent volontairement la même structure de type
#   Recipe. Leur analyse n'apporte aucune valeur qualité/sécurité.
# - data/pt/** : standards + fabricants = dictionnaires statiques.
# - app/*/ville, /services, /specialites, /servicos, /cidade, /urgencia :
#   templates SEO localisés par slug (patterns structurels identiques par
#   design — duplication intentionnelle pour SEO long-tail).
# - app/fr/plan-du-site, app/pt/mapa-do-site : HTML sitemaps bilingues
#   miroirs FR/PT par design (UX + maillage interne).
sonar.exclusions=node_modules/**,out/**,.next/**,android/**,ios/**,public/**,supabase/migrations/**,.claude/**,scripts/**,lib/estimation-materiaux/recipes/**,lib/estimation-materiaux/data/**,app/fr/ville/**,app/fr/services/**,app/fr/specialites/**,app/pt/servicos/**,app/pt/cidade/**,app/pt/urgencia/**,app/en/[slug]/**,app/es/[slug]/**,app/fr/plan-du-site/**,app/pt/mapa-do-site/**
sonar.test.exclusions=node_modules/**

# Copy-Paste-Detection : ceinture + bretelles (même si déjà dans exclusions).
# lib/syndic/prompts/** : prompts agents IA splittés FR/PT par design (isolation
# locale stricte requise par spec §3.10 — Max FR ne doit jamais citer loi PT
# et vice-versa). La duplication entre `*-fr.ts` et `*-pt.ts` est intentionnelle.
# lib/cerebras.ts : client OpenAI-compatible mirror exact de lib/groq.ts pour le
# fallback inter-provider sur rate-limit Groq. Mêmes shapes (auth, retry, models)
# par design — ce sont deux clients provider parallèles.
# tests/lib/cerebras.test.ts : mêmes patterns de tests que tests/lib/groq.test.ts
# par design (clients symétriques).
sonar.cpd.exclusions=lib/estimation-materiaux/recipes/**,lib/estimation-materiaux/data/**,app/fr/ville/**,app/fr/services/**,app/fr/specialites/**,app/pt/servicos/**,app/pt/cidade/**,app/pt/urgencia/**,app/fr/plan-du-site/**,app/pt/mapa-do-site/**,lib/syndic/prompts/**,lib/cerebras.ts,tests/lib/cerebras.test.ts

# Qualité gate : relaxation sur la dette technique — le code existant a de la
# dette documentée qui ne doit pas bloquer les PR features.
sonar.qualitygate.wait=false
sonar.newCode.referenceBranch=main

# Language settings
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
