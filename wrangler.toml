# ═══��══════════════════════════════════════════════════════════════════════════
# Vitfix.io — Cloudflare Pages Configuration
# ═��════════════════════════════════════════════════════��═══════════════════════
# This file configures Cloudflare Workers/Pages for the fixit-production project.
# Used with @opennextjs/cloudflare for Next.js deployment.

name = "vitfix"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Worker Routes — custom domains
[[routes]]
pattern = "vitfix.io/*"
zone_name = "vitfix.io"

[[routes]]
pattern = "www.vitfix.io/*"
zone_name = "vitfix.io"

# ── Workers Limits ───────────────────────────────────────────────────────────
# Workers Paid: 30s CPU time, 128 MB memory, 10 MB compressed bundle
# Queues consumers get up to 15 minutes per batch

# ── KV Namespace Bindings ──────────────���─────────────────────────────────────
# App cache layer (replaces in-memory Map for stateless Workers)
# Create with: wrangler kv namespace create CACHE
# [[kv_namespaces]]
# binding = "CACHE"
# id = "<KV_NAMESPACE_ID>"

# ── Workers AI Binding ──────────────────────────────────────────────────────
# Permet d'appeler les modèles Cloudflare AI (BGE-M3 embeddings + BGE-reranker)
# sans token API au runtime. Utilisé par Max consultor juridique pour le
# retrieval sémantique multi-étapes (cf. lib/syndic/embed.ts).
[ai]
binding = "AI"

# ── Cron Triggers ─────────��──────────────────────────────────────────────────
# Migrated from vercel.json crons.
# Routes < 30s CPU can be triggered directly.
# Routes > 30s must use Queues (see queue bindings below).
# crons = [] EXPLICITE et NE PAS supprimer la clé : wrangler ne déprovisionne
# les schedules déjà déployés QUE si la clé est présente (PUT /schedules sauté
# si elle est absente) — la liste vide retire les 5 crons fantômes posés par
# les anciens deploys. Le worker OpenNext n'exporte pas de handler `scheduled`
# (audit P1, CFG-03) : des crons déclarés ici ne s'exécuteraient JAMAIS.
# Tous les crons passent par GitHub Actions :
#   .github/workflows/crons.yml                      (health, referral, booking/devis reminders, email-agent poll)
#   .github/workflows/run-automations.yml            (tempo automations, 5 min)
#   .github/workflows/run-lea-documents-process.yml  (Lea OCR safety net, 15 min)
[triggers]
crons = []

# ── Queue Bindings ─────────────────────────────────────��─────────────────────
# For long-running jobs that exceed Workers 30s CPU limit.
# Producers enqueue, consumers process in background (up to 15 min).

# Create with: wrangler queues create fixit-sync-jobs
# [[queues.producers]]
# binding = "SYNC_QUEUE"
# queue = "fixit-sync-jobs"

# [[queues.consumers]]
# queue = "fixit-sync-jobs"
# max_batch_timeout = 30
# max_retries = 2

# ── Long-Running Jobs (require Queues or external service) ──────────────────
# These were Vercel crons with maxDuration > 30s:
#
# | Job                    | Old Schedule    | maxDuration | Strategy           |
# |------------------------|-----------------|-------------|---------------------|
# | /api/tenders/scan      | 0 5 * * 5       | 300s        | Queue consumer      |
# | /api/cron/scan-marches | 0 6 * * 1       | 300s        | Queue consumer      |
# | /api/marches/scan      | (on-demand)     | 120s        | Queue consumer      |
# | /api/sync/decp-13      | 0 7 * * 2       | 60s         | Queue consumer      |
# | /api/sync/sitadel-13   | 0 7 * * 3       | 60s         | Queue consumer      |
# | /api/sync/mairies-13   | 30 7 * * 2      | 60s         | Queue consumer      |
# | /api/sync/base-gov-pt  | 0 8 * * 4       | 60s         | Queue consumer      |
# | /api/sync/ted-porto    | 30 8 * * 3      | 60s         | Queue consumer      |
# | /api/sync/obras-porto  | 0 9 * * 4       | 60s         | Queue consumer      |
# | /api/email-agent/poll  | 0 8 * * *       | 60s         | Batched pagination  |
# | /api/user/export-data  | (on-demand)     | 60s         | Queue consumer      |
#
# Implementation: Create a queue producer API route that enqueues the job,
# and a queue consumer that processes it with up to 15 min execution time.

