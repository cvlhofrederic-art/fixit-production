# ═══��══════════════════════════════════════════════════════════════════════════
# Vitfix.io — Cloudflare Pages Configuration
# ═��════════════════════════════════════════════════════��═══════════════════════
# This file configures Cloudflare Workers/Pages for the fixit-production project.
# Used with @opennextjs/cloudflare for Next.js deployment.

name = "vitfix"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Worker Routes — custom domains
[[routes]]
pattern = "vitfix.io/*"
zone_name = "vitfix.io"

[[routes]]
pattern = "www.vitfix.io/*"
zone_name = "vitfix.io"

# ── Workers Limits ───────────────────────────────────────────────────────────
# Workers Paid: 30s CPU time, 128 MB memory, 10 MB compressed bundle
# Queues consumers get up to 15 minutes per batch

# ── KV Namespace Bindings ──────────────���─────────────────────────────────────
# App cache layer (replaces in-memory Map for stateless Workers)
# Create with: wrangler kv namespace create CACHE
# [[kv_namespaces]]
# binding = "CACHE"
# id = "<KV_NAMESPACE_ID>"

# ── Cron Triggers ─────────��──────────────────────────────────────────────────
# Migrated from vercel.json crons.
# Routes < 30s CPU can be triggered directly.
# Routes > 30s must use Queues (see queue bindings below).
[triggers]
crons = [
  # Health check — daily 6 AM UTC
  "0 6 * * *",
  # Referral processing — daily 2 AM UTC
  "0 2 * * *",
  # Booking reminders — daily 7 AM UTC
  "0 7 * * *",
  # Devis reminders — daily 7:30 AM UTC
  "30 7 * * *",
  # Email agent poll — daily 8 AM UTC (must be batched < 30s)
  "0 8 * * *",
  # Revenue snapshot — daily 4 AM UTC (computes MRR / churn / counts
  # into subscription_metrics). Requires migration 100 to be applied.
  "0 4 * * *",
  # Stripe webhook stale check — every 6 hours (flags processed_at -
  # received_at gap > 30 min). Requires migration 104 to be applied.
  "0 */6 * * *",
]

# ── Queue Bindings ───────────────────────────────────────────────────────────
# For long-running jobs that exceed Workers 30s CPU limit.
# Producers enqueue, consumers process in background (up to 15 min).
#
# Activation procedure (do NOT skip steps):
#   1.  wrangler queues create fixit-sync-jobs
#   2.  Uncomment the [[queues.producers]] block below.
#   3.  Deploy to a preview environment and POST /api/tenders/scan with a
#       valid auth header. The response should be 202 with { queued: true,
#       jobId } and a row should appear in the background_jobs table once
#       the consumer picks it up.
#   4.  Wire the consumer in the OpenNext worker entry (the queue consumer
#       handler is NOT a Next.js API route — it is the worker default
#       export's `queue(batch, env)` method). Until that is in place,
#       enqueued jobs accumulate but do not run, so KEEP the [[queues.consumers]]
#       block commented while the producer is being validated.
#   5.  Once the consumer is wired and verified, uncomment [[queues.consumers]].
#   6.  Promote to production.
#
# The producer-side code in app/api/tenders/scan/route.ts already checks for
# the SYNC_QUEUE binding at runtime and falls back to the inline scan when
# absent. Activating the binding is a zero-risk capability flip.

# IMPORTANT: queue `fixit-sync-jobs` is already provisioned in Cloudflare
# (created 2026-04-22, 0 producers / 0 consumers attached). We deliberately
# keep BOTH blocks commented because:
#   - Decommenting the producer alone would route /api/tenders/scan calls
#     to an orphan queue (consumer not yet wired in the OpenNext worker
#     entry → enqueued jobs would never run, breaking the scan).
#   - Activation must be a single atomic step: wire consumer first, then
#     decomment both producer + consumer in the same deploy.
#
# [[queues.producers]]
# binding = "SYNC_QUEUE"
# queue = "fixit-sync-jobs"

# [[queues.consumers]]
# queue = "fixit-sync-jobs"
# max_batch_timeout = 30
# max_retries = 2

# ── Long-Running Jobs (require Queues or external service) ──────────────────
# These were Vercel crons with maxDuration > 30s:
#
# | Job                    | Old Schedule    | maxDuration | Strategy           |
# |------------------------|-----------------|-------------|---------------------|
# | /api/tenders/scan      | 0 5 * * 5       | 300s        | Queue consumer      |
# | /api/cron/scan-marches | 0 6 * * 1       | 300s        | Queue consumer      |
# | /api/marches/scan      | (on-demand)     | 120s        | Queue consumer      |
# | /api/sync/decp-13      | 0 7 * * 2       | 60s         | Queue consumer      |
# | /api/sync/sitadel-13   | 0 7 * * 3       | 60s         | Queue consumer      |
# | /api/sync/mairies-13   | 30 7 * * 2      | 60s         | Queue consumer      |
# | /api/sync/base-gov-pt  | 0 8 * * 4       | 60s         | Queue consumer      |
# | /api/sync/ted-porto    | 30 8 * * 3      | 60s         | Queue consumer      |
# | /api/sync/obras-porto  | 0 9 * * 4       | 60s         | Queue consumer      |
# | /api/email-agent/poll  | 0 8 * * *       | 60s         | Batched pagination  |
# | /api/user/export-data  | (on-demand)     | 60s         | Queue consumer      |
#
# Implementation: Create a queue producer API route that enqueues the job,
# and a queue consumer that processes it with up to 15 min execution time.

