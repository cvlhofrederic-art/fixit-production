<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Telhador e isolamento">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaea"/>
      <stop offset="1" stop-color="#f5f3ef"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(420 130)">
    <rect x="40" y="160" width="280" height="180" fill="#fff" stroke="#1a1a1a" stroke-width="6"/>
    <polygon points="0,160 180,20 360,160" fill="#FFC107" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
    <line x1="40" y1="180" x2="320" y2="180" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="40" y1="220" x2="320" y2="220" stroke="#1a1a1a" stroke-width="3"/>
    <rect x="140" y="240" width="80" height="100" fill="#1a1a1a"/>
  </g>
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#1a1a1a">Telhados, Isolamento &amp; Capoto</text>
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#6b6b6b">VITFIX Portugal</text>
</svg>
